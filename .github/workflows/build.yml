name: Build

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          
      - name: Debug - list current dir
        run: |
          pwd
          ls -la
          
      - name: Check if gradlew exists
        run: |
          ls -la gradlew 2>/dev/null || echo "No gradlew found"
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: List Gradle files
        run: ls -la gradle*
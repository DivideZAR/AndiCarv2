name: Build

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Print environment info
        run: |
          echo "Gradle version:"
          ./gradlew --version || echo "Gradle check skipped (requires ANDROID_SDK_ROOT)"
          echo ""
          echo "Local build requires Android SDK - see DEVELOPMENT.md"